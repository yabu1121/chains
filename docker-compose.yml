# Local infrastructure for Chains. The Go API and Next.js app run on the host
# (go run / npm run dev); this file only provides PostgreSQL and Redis.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chains
      POSTGRES_PASSWORD: chains
      POSTGRES_DB: chains
    ports:
      - "5432:5432"
    volumes:
      - chains_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chains -d chains"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  chains_pg:
